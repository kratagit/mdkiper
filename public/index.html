<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mdkiper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body class="preload">
    <div class="app-container">
        <!-- Sidebar with notes list -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-header-line">
                    <h1>mdkiper</h1>
                    <button id="hideSidebarBtn" class="icon-btn" title="Hide panel">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    </button>
                </div>
                
                <button id="newNoteBtn" class="primary-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    <span>New note</span>
                </button>

                <div class="search-container">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" placeholder="Search notes">
                </div>
            </div>
            <ul class="notes-list" id="notesList"></ul>
            <div class="sidebar-footer" style="padding: 10px 12px; border-top: 1px solid var(--border-color); margin-top: auto; display: flex; justify-content: flex-end;">
                <button id="settingsBtn" class="icon-btn gear-btn" title="Settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </div>

        <main class="main-content">
            <button id="showSidebarBtn" class="icon-btn floating-btn hidden" title="Show panel">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
            </button>
            <div class="content-area empty-mode" id="contentArea">
                <!-- Global empty state -->
                <div class="global-empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px; opacity: 0.5;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <p>Select a note from the list or create a new one.</p>
                </div>

                <!-- Left pane: Editor -->
                <div class="pane editor-pane">
                    <div class="pane-header">
                        <span class="pane-header-title">Markdown</span>
                        <div class="pane-actions">
                            <span id="saveStatus" class="save-status"></span>
                            <button id="togglePreviewBtn" class="icon-btn" title="Toggle Preview">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><line x1="15" y1="3" x2="15" y2="21"></line><path d="m10 15 3-3-3-3"></path></svg>
                            </button>
                        </div>
                    </div>
                    <textarea id="noteEditor" class="editor" placeholder="Type content in Markdown format. Changes are saved automatically." disabled></textarea>
                </div>
                
                <div class="pane preview-pane">
                    <div class="pane-header">
                        <span class="pane-header-title">Live Preview</span>
                        <div class="pane-actions">
                            <button id="toggleEditorBtn" class="icon-btn" title="Toggle Editor">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line><path d="m14 15-3-3 3-3"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="preview-scroll">
                        <div id="notePreview" class="preview markdown-body">
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <!-- Note options context menu -->
    <div id="noteContextMenu" class="dropdown-menu hidden">
        <div class="dropdown-item" id="ctxRename">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            Rename
        </div>
        <div class="dropdown-item danger" id="ctxDelete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Delete
        </div>
    </div>

    <!-- Custom Modal (Prompt / Confirm) -->
    <div id="appModalOverlay" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 id="modalTitle" class="modal-title"></h2>
            <p id="modalMessage" class="modal-message"></p>
            <input type="text" id="modalInput" class="modal-input" autocomplete="off">
            <div class="modal-actions">
                <button id="modalCancelBtn" class="modal-btn modal-btn-cancel">Cancel</button>
                <button id="modalConfirmBtn" class="modal-btn modal-btn-confirm">OK</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 class="modal-title" style="margin-bottom: 20px;">Settings</h2>
            <div class="settings-options" style="margin-bottom: 24px;">
                <label style="display: flex; align-items: flex-start; gap: 12px; cursor: pointer;">
                    <div class="toggle-switch" style="margin-top: 2px;">
                        <input type="checkbox" id="syncScrollCheckbox">
                        <span class="toggle-slider"></span>
                    </div>
                    <div style="display: flex; flex-direction: column;">
                        <span style="font-size: 0.95rem;">Synchronized Scrolling</span>
                        <span style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; line-height: 1.4;">
                            Automatically scroll the preview when you scroll the editor, and vice versa.
                        </span>
                    </div>
                </label>
            </div>
            <div class="modal-actions">
                <button id="closeSettingsBtn" class="modal-btn modal-btn-confirm">Close</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
