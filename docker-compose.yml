version: '3.8'

services:
  mdkiper:
    image: ghcr.io/kratagit/mdkiper:latest
    container_name: mdkiper
    restart: unless-stopped
    ports:
      - "3005:3005"
    volumes:
      # Mapowanie lokalnego katalogu na katalog w kontenerze,
      # co zapewnia zachowanie notatek przy aktualizacjach WUD
      - ./data:/app/data
